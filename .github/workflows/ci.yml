name: CI Pipeline (Beginner Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print system info
        run: |
          echo "CI is running successfully"
          echo "Repository cloned"
          echo "Runner OS:"
          uname -a
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la

      - name: Simulate build
        run: echo "Build step completed"

      - name: Simulate tests
        run: echo "All tests passed"